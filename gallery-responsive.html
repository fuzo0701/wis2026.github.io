<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a1628">
<title>WIS 2026 · 현장 갤러리</title>
<style>
  :root{
    --ink:#0a1628;
    --ink-2:#0e1d33;
    --ink-3:#13243d;
    --gold:#d4a857;
    --paper:#f4f1ea;
    --muted:rgba(244,241,234,0.62);
    --line:rgba(244,241,234,0.14);
    --line-2:rgba(244,241,234,0.28);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--ink);color:var(--paper);
    font-family:-apple-system,BlinkMacSystemFont,"Pretendard","Apple SD Gothic Neo",sans-serif;
    line-height:1.55;-webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  a{color:inherit;}
  button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;}
  img{display:block;max-width:100%;}

  /* ===== Top bar ===== */
  .topbar{
    position:sticky;top:0;z-index:30;
    background:rgba(10,22,40,0.85);backdrop-filter:saturate(140%) blur(10px);
    border-bottom:1px solid var(--line);
  }
  .topbar-inner{
    display:flex;align-items:center;justify-content:space-between;gap:14px;
    padding:12px 18px;max-width:1400px;margin:0 auto;
  }
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;letter-spacing:-0.02em;}
  .brand .mark{width:5px;height:18px;background:var(--gold);display:inline-block;}
  .brand small{
    font-family:"JetBrains Mono",ui-monospace,monospace;font-weight:500;font-size:11px;
    color:var(--muted);letter-spacing:0.12em;
  }
  .topbar .meta{
    font-family:"JetBrains Mono",ui-monospace,monospace;font-size:11px;
    letter-spacing:0.14em;color:var(--muted);
  }

  /* ===== Hero ===== */
  .hero{
    padding:48px 22px 28px;max-width:1400px;margin:0 auto;
    border-bottom:1px solid var(--line);
  }
  .hero .kicker{
    font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:0.22em;
    color:var(--gold);
  }
  .hero h1{
    font-size:clamp(28px,5vw,52px);font-weight:700;letter-spacing:-0.025em;
    margin-top:10px;
  }
  .hero h1 .en{color:var(--muted);font-weight:500;font-size:0.5em;letter-spacing:0.04em;margin-left:14px;}
  .hero p{margin-top:14px;color:rgba(244,241,234,0.78);max-width:60ch;font-size:15px;}
  .hero .stats{
    display:flex;gap:32px;margin-top:24px;flex-wrap:wrap;
  }
  .hero .stat{display:flex;flex-direction:column;gap:4px;}
  .hero .stat .num{font-size:28px;font-weight:700;letter-spacing:-0.02em;color:var(--gold);}
  .hero .stat .label{
    font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:0.18em;color:var(--muted);
    text-transform:uppercase;
  }

  /* ===== Topic chip nav (horizontal scroll on mobile) ===== */
  .chips{
    position:sticky;top:46px;z-index:20;
    background:rgba(10,22,40,0.85);backdrop-filter:saturate(140%) blur(10px);
    border-bottom:1px solid var(--line);
  }
  .chips-inner{
    display:flex;gap:8px;padding:12px 18px;overflow-x:auto;
    max-width:1400px;margin:0 auto;
    scrollbar-width:thin;
  }
  .chips-inner::-webkit-scrollbar{height:6px;}
  .chips-inner::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:6px;}
  .chip{
    flex:none;padding:6px 12px;border:1px solid var(--line);border-radius:999px;
    font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:0.14em;
    color:var(--muted);text-decoration:none;transition:all .15s ease;
    white-space:nowrap;
  }
  .chip:hover{color:var(--paper);border-color:var(--gold);}

  /* ===== Topic sections ===== */
  main{max-width:1400px;margin:0 auto;padding:8px 18px 80px;}
  .topic{padding:38px 0;border-bottom:1px solid var(--line);}
  .topic:last-child{border-bottom:none;}
  .topic-head{
    display:grid;grid-template-columns:auto 1fr auto;align-items:start;gap:16px 22px;
    padding-bottom:22px;
  }
  .topic-num{
    font-family:"JetBrains Mono",monospace;font-size:13px;font-weight:700;
    color:var(--ink);background:var(--gold);
    padding:8px 12px;letter-spacing:0.1em;align-self:start;
  }
  .topic-title{font-size:clamp(18px,2.5vw,22px);font-weight:600;letter-spacing:-0.015em;}
  .topic-count{
    font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:0.16em;
    color:var(--muted);align-self:start;padding-top:10px;
  }
  .topic-desc{
    grid-column:2/3;color:rgba(244,241,234,0.78);font-size:14.5px;line-height:1.7;
    max-width:75ch;
  }

  .topic-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
    gap:12px;
  }

  .card{
    position:relative;background:var(--ink-2);border:1px solid var(--line);
    overflow:hidden;cursor:pointer;transition:transform .2s ease, border-color .2s ease;
  }
  .card:hover{border-color:var(--gold);transform:translateY(-2px);}
  .card-img-wrap{
    aspect-ratio:4/3;background:var(--ink-3);overflow:hidden;
  }
  .card img{width:100%;height:100%;object-fit:cover;transition:transform .3s ease;}
  .card:hover img{transform:scale(1.04);}
  .card-id{
    position:absolute;top:8px;left:8px;
    background:rgba(10,22,40,0.78);backdrop-filter:blur(6px);
    color:var(--paper);padding:4px 9px;
    font-family:"JetBrains Mono",monospace;font-size:10.5px;letter-spacing:0.14em;
    border:1px solid var(--line-2);
  }

  /* ===== Lightbox ===== */
  .lb{
    position:fixed;inset:0;z-index:100;
    background:rgba(5,12,22,0.96);backdrop-filter:blur(8px);
    display:none;align-items:center;justify-content:center;
    padding:18px;
    touch-action:pan-y;user-select:none;-webkit-user-select:none;
  }
  .lb.is-open{display:flex;}
  .lb-stage{
    position:relative;width:100%;height:100%;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
  }
  .lb-img{
    max-width:100%;max-height:calc(100vh - 200px);object-fit:contain;
    pointer-events:none;
  }
  .lb-meta{
    margin-top:18px;width:100%;max-width:780px;
    display:grid;grid-template-columns:auto 1fr;gap:8px 16px;align-items:start;
  }
  .lb-id{
    font-family:"JetBrains Mono",monospace;font-size:11px;
    background:var(--gold);color:var(--ink);padding:5px 10px;letter-spacing:0.14em;
    align-self:start;
  }
  .lb-cap{font-size:14.5px;line-height:1.65;color:rgba(244,241,234,0.92);}
  .lb-counter{
    margin-top:6px;font-family:"JetBrains Mono",monospace;font-size:11px;
    color:var(--muted);letter-spacing:0.14em;grid-column:2/3;
  }

  .lb-btn{
    position:absolute;width:46px;height:46px;border-radius:50%;
    background:rgba(244,241,234,0.06);border:1px solid var(--line);
    color:var(--paper);font-size:20px;
    display:grid;place-items:center;transition:all .15s ease;
    -webkit-tap-highlight-color:transparent;
  }
  .lb-btn:hover{background:rgba(244,241,234,0.12);border-color:var(--gold);}
  .lb-prev{left:14px;top:50%;transform:translateY(-50%);}
  .lb-next{right:14px;top:50%;transform:translateY(-50%);}
  .lb-close{top:14px;right:14px;}

  /* ===== Responsive ===== */
  @media (max-width:760px){
    .topic-head{grid-template-columns:auto 1fr;grid-template-rows:auto auto;}
    .topic-count{grid-column:1/3;justify-self:start;padding-top:0;}
    .topic-desc{grid-column:1/3;}
    .topic-grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;}
    .lb-prev,.lb-next{width:42px;height:42px;}
  }
  @media (max-width:480px){
    .hero{padding:36px 18px 22px;}
    .hero .stats{gap:22px;}
    .topic-grid{grid-template-columns:repeat(2,1fr);}
    .topbar-inner{padding:10px 14px;}
    .chips-inner{padding:10px 14px;}
    .lb-img{max-height:calc(100vh - 240px);}
    .lb-meta{padding:0 4px;}
  }

  /* Reduce motion for accessibility */
  @media (prefers-reduced-motion:reduce){
    *{transition:none !important;animation:none !important;}
    html{scroll-behavior:auto;}
  }

  /* Print: just photos, big */
  @media print{
    .topbar,.chips,.lb{display:none;}
    body{background:#fff;color:#000;}
    .hero,.topic-head{border-color:#ccc;}
    .topic-grid{grid-template-columns:repeat(2,1fr);}
    .card{border-color:#ccc;page-break-inside:avoid;}
  }
</style>
</head>

    '019':'임원실·회의실 등 보안이 필요한 공간에서 도청·녹취 시도를 탐지·차단하는 솔루션. 무선 신호 분석, 음성 마스킹, 보안 인증 출입 등을 결합한 종합 정보보호 패키지.',
    '020':'디자이노블의 AI 기반 검색 가시성(SEO·AEO) 솔루션. 자사 콘텐츠가 ChatGPT·Perplexity 등 생성형 AI 검색에 어떻게 노출되는지 분석하고 최적화 전략을 제안.',
    '021':'공공기관 민원 응대를 AI가 보조하는 서비스. 음성·챗봇 채널에서 접수된 민원을 분류·요약·우선순위화하고, 담당자 배정과 처리 이력 관리를 자동화.',
    '022':'기업·기관에서 사용하는 공인·사설 인증서의 발급·갱신·폐기를 통합 관리하는 PKI 플랫폼. 만료 알림, 정책 기반 발급, 감사 로그 기능으로 보안 거버넌스 강화.',
    '023':'근무한 만큼의 급여를 정기 급여일 이전에 즉시 받을 수 있는 핀테크 서비스. 근태 데이터와 연동하여 신청 즉시 입금되며, 근로자 복지와 자금 흐름 개선에 기여.',
    '025':'GPT, Claude Code 등 서로 다른 LLM 에이전트가 동일 과제를 두고 토론·협업하도록 오케스트레이션하는 플랫폼. 의견 충돌·합의를 통해 결과 품질을 높이는 멀티에이전트 워크플로우.',
    '026':'CCTV·차량 센서 영상을 AI가 분석해 보행자 충돌 위험을 사전 예측·경고하는 도시 안전 솔루션. 어린이 보호구역, 교차로 등 사고 다발 지점에 우선 도입을 목표로 한다.',
    '027':'비대면 계약·동의서 처리를 위한 전자서명 SaaS. 본인인증, 서명 흐름 자동화, 서명 후 위·변조 방지 검증을 지원하며 다양한 외부 시스템과 API 연동이 가능.',
    '028':'다국어 사용자 간 음성·텍스트 대화를 실시간 통역해 주는 커뮤니케이션 솔루션. 콜센터, 관광·의료 안내, 글로벌 컨퍼런스 등에서 언어 장벽을 즉시 해소.',
    '029':'팀 단위 업무 흐름을 학습한 AI가 일정 조율, 자료 정리, 회의 준비, 후속 조치까지 자동 처리해 주는 Team Agent 솔루션. 조직의 반복 업무를 줄이고 의사결정 속도를 높인다.',
    '031':'의약품·바이오 물류의 콜드체인 상태(온도·습도·위치)를 IoT 센서로 수집하고 블록체인에 기록하여 위·변조 없는 이력 추적을 제공하는 플랫폼. AI가 이상 징후를 사전 탐지.',
    '032':'제조 라인의 작업 매뉴얼·이상 데이터를 학습한 AI가 현장 작업자에게 실시간 가이드와 트러블슈팅을 제공하는 어시스턴트. 숙련 노하우를 디지털화해 인력 의존도를 낮춘다.',
    '033':'산지 직송 해산물의 신선도 유지를 위한 콜드체인 배송 플랫폼. 주문·재고·물류 추적을 통합하고, 온도 이력 데이터로 신뢰성 있는 신선식품 유통을 구현.',
    '034':'다수 GPU 자원의 할당, 작업 큐, 사용량 모니터링, 비용 최적화를 통합한 GPU 운영 관리 솔루션. AI 학습·추론 워크로드의 효율을 높이고 자원 낭비를 최소화.'
  };

  // === Photo files (sorted) — keep in sync with gallery folder ===
  const FILES = [
    '001-1.jpg','001-2.jpg',
    '002-1.jpg','003-1.jpg','004-1.jpg','005-1.jpg','006-1.jpg','007-1.jpg','008-1.jpg',
    '009-1.jpg','009-2.jpg',
    '010-1.jpg','011-1.jpg','012-1.jpg','013-1.jpg','014-1.jpg','015-1.jpg','016-1.jpg',
    '017-1.jpg','017-2.jpg','017-3.jpg',
    '018-1.jpg','018-2.jpg','018-3.jpg','018-4.jpg',
    '019-1.jpg','020-1.jpg',
    '021-1.jpg','021-2.jpg','021-3.jpg','021-4.jpg',
    '022-1.jpg','022-2.jpg','022-3.jpg',
    '023-1.jpg','025-1.jpg','026-1.jpg',
    '027-1.jpg','027-2.jpg','027-3.jpg',
    '028-1.jpg','028-2.jpg','028-3.jpg',
    '029-1.jpg',
    '031-1.jpg','031-2.jpg','031-3.jpg',
    '032-1.jpg','032-2.jpg',
    '033-1.jpg',
    '034-1.jpg','034-2.jpg'
  ];

  // === Group by prefix ===
  const groups = {};
  const order = [];
  for (let i = 0; i < FILES.length; i++) {
    const f = FILES[i];
    const ident = f.replace(/\.[^.]+$/, '');
    const prefix = ident.split('-')[0];
    if (!groups[prefix]) { groups[prefix] = []; order.push(prefix); }
    groups[prefix].push({ file: f, ident: ident, globalIdx: i });
  }

  // Stats
  document.getElementById('statTopics').textContent = order.length;
  document.getElementById('statPhotos').textContent = FILES.length;

  // === Render chips ===
  const chipsEl = document.getElementById('chips');
  for (const p of order) {
    const a = document.createElement('a');
    a.href = '#topic-' + p;
    a.className = 'chip';
    a.textContent = p + ' · ' + (TITLES[p] || '—');
    chipsEl.appendChild(a);
  }

  // === Render topics ===
  const topicsEl = document.getElementById('topics');
  for (const p of order) {
    const sec = document.createElement('section');
    sec.className = 'topic';
    sec.id = 'topic-' + p;

    const head = document.createElement('div');
    head.className = 'topic-head';
    head.innerHTML =
      '<div class="topic-num">' + p + '</div>' +
      '<h2 class="topic-title">' + (TITLES[p] || '—') + '</h2>' +
      '<div class="topic-count">' + groups[p].length + ' photo' + (groups[p].length > 1 ? 's' : '') + '</div>' +
      '<p class="topic-desc">' + (DESCS[p] || '') + '</p>';
    sec.appendChild(head);

    const grid = document.createElement('div');
    grid.className = 'topic-grid';
    for (const ph of groups[p]) {
      const card = document.createElement('button');
      card.type = 'button';
      card.className = 'card';
      card.dataset.idx = ph.globalIdx;
      card.innerHTML =
        '<div class="card-img-wrap">' +
          '<img loading="lazy" src="gallery/' + ph.file + '" alt="' + ph.ident + '">' +
        '</div>' +
        '<span class="card-id">' + ph.ident + '</span>';
      grid.appendChild(card);
    }
    sec.appendChild(grid);
    topicsEl.appendChild(sec);
  }

  // === Build flat list for lightbox navigation ===
  const PHOTOS = [];
  for (const p of order) {
    for (const ph of groups[p]) {
      PHOTOS.push({ file: ph.file, ident: ph.ident, prefix: p });
    }
  }

  // === Lightbox ===
  const lb = document.getElementById('lb');
  const lbImg = document.getElementById('lbImg');
  const lbId = document.getElementById('lbId');
  const lbCap = document.getElementById('lbCap');
  const lbCounter = document.getElementById('lbCounter');
  let cur = 0;

  function open(i) {
    cur = i;
    render();
    lb.classList.add('is-open');
    document.body.style.overflow = 'hidden';
  }
  function close() {
    lb.classList.remove('is-open');
    document.body.style.overflow = '';
  }
  function render() {
    const p = PHOTOS[cur];
    lbImg.src = 'gallery/' + p.file;
    lbImg.alt = p.ident;
    lbId.textContent = p.ident;
    lbCap.textContent = DESCS[p.prefix] || '';
    lbCounter.textContent = (cur + 1) + ' / ' + PHOTOS.length;
  }
  function go(delta) {
    cur = (cur + delta + PHOTOS.length) % PHOTOS.length;
    render();
  }

  // Card click → open
  topicsEl.addEventListener('click', function(e){
    const card = e.target.closest('.card');
    if (!card) return;
    open(parseInt(card.dataset.idx, 10));
  });

  document.getElementById('lbPrev').addEventListener('click', function(e){ e.stopPropagation(); go(-1); });
  document.getElementById('lbNext').addEventListener('click', function(e){ e.stopPropagation(); go(1); });
  document.getElementById('lbClose').addEventListener('click', close);
  lb.addEventListener('click', function(e){ if (e.target === lb || e.target.classList.contains('lb-stage')) close(); });

  // Keyboard
  document.addEventListener('keydown', function(e){
    if (!lb.classList.contains('is-open')) return;
    if (e.key === 'Escape') close();
    else if (e.key === 'ArrowLeft') go(-1);
    else if (e.key === 'ArrowRight') go(1);
  });

  // Touch swipe
  let touchX = null;
  lb.addEventListener('touchstart', function(e){
    if (e.touches.length === 1) touchX = e.touches[0].clientX;
  }, { passive: true });
  lb.addEventListener('touchend', function(e){
    if (touchX === null) return;
    const dx = (e.changedTouches[0].clientX) - touchX;
    if (Math.abs(dx) > 40) go(dx < 0 ? 1 : -1);
    touchX = null;
  }, { passive: true });
})();
</script>
</body>
</html>
